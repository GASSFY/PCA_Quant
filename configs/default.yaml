# =============================================================================
# PCA_Quant 默认配置
# =============================================================================
# 使用方式：
#   python main_quant.py --config configs/default.yaml
#   python main_eval.py  --config configs/default.yaml --tasks mmmu_val
# =============================================================================

# ----- 模型 -----
model: llava_onevision
model_args: "pretrained=your/model-name"
batch_size: "1"
device: null

# ----- 校准数据（量化时使用） -----
calib_data: coco
n_samples: 128
data_path: ""
image_folder: ""
interleave_format: false
few_shot_format: false
text_data_path: ""

# ----- PCA mixed precision 方法 -----
# method options: proj_log | proj_norm | gate_only | abs_only
method: gate_only
pca_k: 32
pca_sample_size: 512
beta: 1.0

# ----- 混合精度参数 -----
high_precision_ratio: 0.1
high_bit: 16
low_bit: 4
zero_point: true
# 行内分组大小，当前版本要求对每层 in_features 严格整除
w_group: 128

# ----- 量化输出 -----
run_process: true
pseudo_quant: true
scale_path: "scale_cache/pca_quant_model.pt"
results_path: "scale_cache/pca_quant_model.summary.json"

# ----- 评估参数（main_eval.py 使用） -----
tasks: "mmmu_val"
limit: null
output_path: "eval_results"
seed: "0,1234,1234,1234"
gen_kwargs: ""
log_samples: false
verbosity: "INFO"
